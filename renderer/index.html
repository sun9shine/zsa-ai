<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; connect-src *; img-src * data:; frame-src *;">
  <title>ZSA AI - Chat to Code</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Custom Title Bar -->
  <div id="titlebar">
    <div class="titlebar-drag">
      <div class="titlebar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="titlebar-title">ZSA AI — Chat to Code</span>
    </div>
    <div class="titlebar-controls">
      <button id="btn-minimize" class="titlebar-btn" title="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="1.5" fill="currentColor"/></svg>
      </button>
      <button id="btn-maximize" class="titlebar-btn" title="Maximize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button id="btn-close" class="titlebar-btn btn-close" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>
  </div>

  <!-- Main App -->
  <div id="app">
    <!-- Left: Chat Panel -->
    <div id="chat-panel">
      <div id="chat-header">
        <div class="chat-header-left">
          <div class="model-indicator" id="model-indicator">
            <div class="model-dot"></div>
            <span id="active-model-name">No Model</span>
          </div>
        </div>
        <div class="chat-header-right">
          <button id="btn-new-chat" class="icon-btn" title="New Chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
          <button id="btn-settings" class="icon-btn" title="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>

      <div id="chat-messages">
        <!-- Welcome screen -->
        <div id="welcome-screen">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <h1>ZSA AI</h1>
          <p>Describe what you want to build and I'll generate the code with a live preview</p>
          <div class="suggestions">
            <button class="suggestion-btn" data-prompt="Build a modern landing page with animated hero section">Landing page with animations</button>
            <button class="suggestion-btn" data-prompt="Create a dashboard with charts and statistics cards">Dashboard with charts</button>
            <button class="suggestion-btn" data-prompt="Design a login and registration form with validation">Login & Registration form</button>
            <button class="suggestion-btn" data-prompt="Build a todo app with drag and drop functionality">Todo app with drag & drop</button>
          </div>
        </div>
        <!-- Messages will be inserted here -->
      </div>

      <div id="chat-input-area">
        <div id="chat-input-container">
          <textarea id="chat-input" placeholder="Describe what you want to build..." rows="1"></textarea>
          <button id="btn-send" class="send-btn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Resize Handle -->
    <div id="resize-handle"></div>

    <!-- Right: Code/Preview Panel -->
    <div id="right-panel">
      <div id="right-header">
        <div class="tab-group">
          <button class="tab-btn active" data-view="preview">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Preview
          </button>
          <button class="tab-btn" data-view="code">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16,18 22,12 16,6"/><polyline points="8,6 2,12 8,18"/></svg>
            Code
          </button>
          <button class="tab-btn" data-view="split">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
            Split
          </button>
        </div>
        <div class="right-header-actions">
          <button id="btn-device-desktop" class="icon-btn small active" title="Desktop">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </button>
          <button id="btn-device-mobile" class="icon-btn small" title="Mobile">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
          </button>
          <div class="separator"></div>
          <button id="btn-refresh" class="icon-btn small" title="Refresh">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
          </button>
          <button id="btn-copy-code" class="icon-btn small" title="Copy Code">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
          <button id="btn-download" class="icon-btn small" title="Download HTML">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button id="btn-download-zip" class="icon-btn small" title="Download as ZIP">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/><rect x="8" y="2" width="8" height="4" rx="1" stroke="currentColor" fill="none"/><path d="M10 6v2m4-2v2" stroke="currentColor"/></svg>
          </button>
        </div>
      </div>

      <div id="right-content">
        <!-- Preview View -->
        <div id="preview-view" class="view-panel active">
          <div id="preview-container">
            <iframe id="preview-iframe" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
          </div>
        </div>

        <!-- Code View -->
        <div id="code-view" class="view-panel">
          <div id="code-container">
            <div id="line-numbers"></div>
            <pre id="code-content"><code id="code-highlighted"></code></pre>
          </div>
        </div>

        <!-- Split View -->
        <div id="split-view" class="view-panel">
          <div id="split-code">
            <div id="split-line-numbers"></div>
            <pre id="split-code-content"><code id="split-code-highlighted"></code></pre>
          </div>
          <div id="split-divider"></div>
          <div id="split-preview">
            <iframe id="split-preview-iframe" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>AI Model Settings</h2>
        <button id="btn-close-settings" class="icon-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="models-list"></div>
        <button id="btn-add-model" class="add-model-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Add AI Model
        </button>

        <!-- Add Model Form -->
        <div id="add-model-form" class="hidden">
          <div class="form-section">
            <h3>New Model Configuration</h3>
            <div class="form-row">
              <div class="form-group">
                <label>Type</label>
                <div class="type-selector">
                  <button class="type-btn active" data-type="online">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/></svg>
                    Online API
                  </button>
                  <button class="type-btn" data-type="local">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1"/><circle cx="6" cy="18" r="1"/></svg>
                    Local Model
                  </button>
                </div>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Provider</label>
                <select id="model-provider">
                  <option value="openai">OpenAI</option>
                  <option value="anthropic">Anthropic</option>
                  <option value="custom">Custom (OpenAI Compatible)</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="model-name" placeholder="e.g., GPT-4o, Local Llama">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Model Name</label>
                <input type="text" id="model-model" placeholder="e.g., gpt-4o, llama3.1">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Base URL <span class="optional">(optional)</span></label>
                <input type="text" id="model-url" placeholder="https://api.openai.com/v1">
              </div>
            </div>
            <div class="form-row" id="api-key-row">
              <div class="form-group">
                <label>API Key</label>
                <input type="password" id="model-key" placeholder="sk-...">
              </div>
            </div>
            <div class="form-actions">
              <button id="btn-cancel-model" class="btn btn-secondary">Cancel</button>
              <button id="btn-save-model" class="btn btn-primary">Save Model</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
