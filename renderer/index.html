<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; connect-src *; img-src * data: file:; frame-src *;">
  <title>ZSA AI - Chat to Code</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Custom Title Bar -->
  <div id="titlebar">
    <div class="titlebar-drag">
      <div class="titlebar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="titlebar-title">ZSA AI — Chat to Code</span>
    </div>
    <div class="titlebar-controls">
      <button id="btn-lang-toggle" class="titlebar-btn" title="Toggle Language AR/EN">AR</button>
      <button id="btn-minimize" class="titlebar-btn" title="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="1.5" fill="currentColor"/></svg>
      </button>
      <button id="btn-maximize" class="titlebar-btn" title="Maximize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button id="btn-close" class="titlebar-btn btn-close" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>
  </div>


  <!-- Main App -->
  <div id="app">
    <!-- Left: Chat Panel -->
    <div id="chat-panel">
      <div id="chat-header">
        <div class="chat-header-left">
          <!-- Model Switcher -->
          <div class="model-switcher" id="model-switcher">
            <button id="btn-model-switcher" class="model-switcher-btn" title="Switch Model">
              <div class="model-dot"></div>
              <span id="active-model-name">No Model</span>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 12,15 18,9"/></svg>
            </button>
            <div id="model-dropdown" class="model-dropdown hidden">
              <div class="model-dropdown-header">Switch Model</div>
              <div id="model-dropdown-list"></div>
              <button id="btn-dropdown-settings" class="model-dropdown-add">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                Manage Models
              </button>
            </div>
          </div>
        </div>
        <div class="chat-header-right">
          <button id="btn-history" class="icon-btn" title="Chat History">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/>
            </svg>
          </button>
          <button id="btn-new-chat" class="icon-btn" title="New Chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
          <button id="btn-settings" class="icon-btn" title="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>


      <div id="chat-messages">
        <!-- Welcome screen -->
        <div id="welcome-screen">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <h1>ZSA AI</h1>
          <p>Build complete platforms, mobile apps, web apps, and more from a simple description</p>
          <div class="suggestions">
            <button class="suggestion-btn" data-prompt="Build a complete e-commerce platform with product listing, cart, checkout, and admin panel">
              <span class="suggestion-icon">🛒</span>
              E-Commerce Platform
            </button>
            <button class="suggestion-btn" data-prompt="Create a mobile app UI for a social media platform with feed, stories, chat, and profile">
              <span class="suggestion-icon">📱</span>
              Mobile App UI
            </button>
            <button class="suggestion-btn" data-prompt="Build a full web application dashboard with authentication, charts, tables, and settings">
              <span class="suggestion-icon">📊</span>
              Web App Dashboard
            </button>
            <button class="suggestion-btn" data-prompt="Design a complete portfolio website with projects gallery, blog, contact form, and animations">
              <span class="suggestion-icon">🎨</span>
              Portfolio Website
            </button>
            <button class="suggestion-btn" data-prompt="Create a real-time chat application with rooms, user list, typing indicators, and file sharing UI">
              <span class="suggestion-icon">💬</span>
              Chat Application
            </button>
            <button class="suggestion-btn" data-prompt="Build a 2D platformer game with a character that can jump, run, collect coins, avoid enemies, with levels and score">
              <span class="suggestion-icon">🎮</span>
              Platformer Game
            </button>
          </div>
        </div>
        <!-- Messages will be inserted here -->
      </div>


      <!-- Attachments Preview -->
      <div id="attachments-preview" class="hidden">
        <div id="attachments-list"></div>
      </div>

      <div id="chat-input-area">
        <div id="chat-input-container">
          <button id="btn-attach" class="attach-btn" title="Attach files, images, or projects">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <button id="btn-attach-folder" class="attach-btn" title="Attach project folder">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
            </svg>
          </button>
          <textarea id="chat-input" placeholder="Describe what you want to build... (platforms, mobile apps, web apps)" rows="1"></textarea>
          <button id="btn-send" class="send-btn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Resize Handle -->
    <div id="resize-handle"></div>


    <!-- Right: Code/Preview Panel -->
    <div id="right-panel">
      <!-- Project Tabs Bar -->
      <div id="project-tabs-bar">
        <div id="project-tabs-list"></div>
        <button id="btn-add-tab" class="icon-btn small" title="New Tab">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>

      <div id="right-header">
        <div class="tab-group">
          <button class="tab-btn active" data-view="preview">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Preview
          </button>
          <button class="tab-btn" data-view="code">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16,18 22,12 16,6"/><polyline points="8,6 2,12 8,18"/></svg>
            Code
          </button>
          <button class="tab-btn" data-view="split">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
            Split
          </button>
        </div>
        <div class="right-header-actions">
          <!-- Undo/Redo -->
          <button id="btn-undo" class="icon-btn small" title="Undo (Ctrl+Z)" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
          </button>
          <button id="btn-redo" class="icon-btn small" title="Redo (Ctrl+Y)" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
          </button>
          <span id="version-count" class="version-badge">v1</span>
          <div class="separator"></div>

          <!-- Design Tools -->
          <button id="btn-design-tools" class="icon-btn small" title="Design Tools">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          </button>
          <!-- Plugin/Library button -->
          <button id="btn-plugins" class="icon-btn small" title="Add Library">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
          </button>
          <!-- Templates button -->
          <button id="btn-templates" class="icon-btn small" title="Templates">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <div class="separator"></div>
          <button id="btn-device-desktop" class="icon-btn small active" title="Desktop">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </button>
          <button id="btn-device-mobile" class="icon-btn small" title="Mobile">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
          </button>
          <div class="separator"></div>
          <button id="btn-refresh" class="icon-btn small" title="Refresh">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
          </button>
          <button id="btn-copy-code" class="icon-btn small" title="Copy Code">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
          <button id="btn-download" class="icon-btn small" title="Download HTML">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button id="btn-download-zip" class="icon-btn small" title="Download as ZIP">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/><rect x="8" y="2" width="8" height="4" rx="1" stroke="currentColor" fill="none"/></svg>
          </button>
          <button id="btn-deploy" class="icon-btn small" title="Deploy">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><polygon points="22,2 15,22 11,13 2,9 22,2"/></svg>
          </button>
        </div>
      </div>


      <div id="right-content">
        <!-- Preview View -->
        <div id="preview-view" class="view-panel active">
          <div id="preview-container">
            <iframe id="preview-iframe" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
          </div>
        </div>

        <!-- Code View (Editable) -->
        <div id="code-view" class="view-panel">
          <div id="code-container">
            <div id="line-numbers"></div>
            <textarea id="code-editor" spellcheck="false"></textarea>
          </div>
        </div>

        <!-- Split View -->
        <div id="split-view" class="view-panel">
          <div id="split-code">
            <div id="split-line-numbers"></div>
            <textarea id="split-code-editor" spellcheck="false"></textarea>
          </div>
          <div id="split-divider"></div>
          <div id="split-preview">
            <iframe id="split-preview-iframe" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
          </div>
        </div>
      </div>
    </div>
  </div>


  <!-- Settings Modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>AI Model Settings</h2>
        <button id="btn-close-settings" class="icon-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="models-list"></div>
        <button id="btn-add-model" class="add-model-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Add AI Model
        </button>

        <!-- Add Model Form -->
        <div id="add-model-form" class="hidden">
          <div class="form-section">
            <h3>New Model Configuration</h3>
            <div class="form-row">
              <div class="form-group">
                <label>Type</label>
                <div class="type-selector">
                  <button class="type-btn active" data-type="online">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/></svg>
                    Online API
                  </button>
                  <button class="type-btn" data-type="local">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1"/><circle cx="6" cy="18" r="1"/></svg>
                    Local Model
                  </button>
                </div>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Provider</label>
                <select id="model-provider">
                  <option value="openai-compatible">OpenAI Compatible (OpenAI, DeepSeek, Groq, Together, Mistral...)</option>
                  <option value="anthropic">Anthropic (Claude)</option>
                  <option value="ollama">Ollama (Local)</option>
                  <option value="custom">Other</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="model-name" placeholder="e.g., GPT-4o, Local Llama">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Model Name</label>
                <input type="text" id="model-model" placeholder="e.g., gpt-4o, llama3.1">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Base URL <span class="optional">(optional)</span></label>
                <input type="text" id="model-url" placeholder="https://api.openai.com/v1">
              </div>
            </div>
            <div class="form-row" id="api-key-row">
              <div class="form-group">
                <label>API Key</label>
                <input type="password" id="model-key" placeholder="sk-...">
              </div>
            </div>
            <div class="form-actions">
              <button id="btn-cancel-model" class="btn btn-secondary">Cancel</button>
              <button id="btn-save-model" class="btn btn-primary">Save Model</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>


  <!-- History Modal -->
  <div id="history-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 data-i18n="chatHistory">Chat History</h2>
        <button id="btn-close-history" class="icon-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="history-list"></div>
      </div>
    </div>
  </div>

  <!-- Templates Modal -->
  <div id="templates-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-lg">
      <div class="modal-header">
        <h2 data-i18n="templates">Templates</h2>
        <button id="btn-close-templates" class="icon-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="template-categories" class="template-tabs"></div>
        <div id="template-grid" class="template-grid"></div>
      </div>
    </div>
  </div>


  <!-- Design Tools Panel -->
  <div id="design-tools-panel" class="floating-panel hidden">
    <div class="floating-panel-header">
      <span data-i18n="designTools">Design Tools</span>
      <button id="btn-close-design" class="icon-btn small">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="floating-panel-body">
      <div class="design-row">
        <label data-i18n="accentColor">Accent Color</label>
        <input type="color" id="design-color" value="#6366f1">
      </div>
      <div class="design-row">
        <label data-i18n="font">Font</label>
        <select id="design-font">
          <option value="'Segoe UI', sans-serif">Segoe UI</option>
          <option value="'Inter', sans-serif">Inter</option>
          <option value="'Roboto', sans-serif">Roboto</option>
          <option value="'Poppins', sans-serif">Poppins</option>
          <option value="'Fira Code', monospace">Fira Code</option>
          <option value="'Cairo', sans-serif">Cairo (Arabic)</option>
        </select>
      </div>
      <div class="design-row">
        <label data-i18n="theme">Theme</label>
        <button id="btn-theme-toggle" class="btn btn-secondary btn-sm">Dark</button>
      </div>
    </div>
  </div>

  <!-- Plugins/Library Panel -->
  <div id="plugins-panel" class="floating-panel hidden">
    <div class="floating-panel-header">
      <span data-i18n="addLibrary">Add Library</span>
      <button id="btn-close-plugins" class="icon-btn small">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="floating-panel-body">
      <button class="plugin-btn" data-lib="tailwind">Tailwind CSS</button>
      <button class="plugin-btn" data-lib="threejs">Three.js</button>
      <button class="plugin-btn" data-lib="gsap">GSAP</button>
      <button class="plugin-btn" data-lib="chartjs">Chart.js</button>
      <button class="plugin-btn" data-lib="phaser">Phaser</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
